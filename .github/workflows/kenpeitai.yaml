# ║  管轄: 陸軍大臣 — @Imperial-army 直屬                        ║
# ║  任務: 天皇陛下御護衛・不敬取締・國體符牒護持               ║
# ║                                                              ║
# ║  ※ 本 workflow ハ陸軍省ノ專管事項ナリ。                      ║
# ║    海軍（@Imperial-navy）トハ管轄ヲ峻別ス。                  ║
# ║    海軍ノ符牒規律審査ハ tokkeitai.yaml ニテ獨自ニ實施。      ║
