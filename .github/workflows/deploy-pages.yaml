name: 📜 內閣印刷局官報掛載 — 帝國憲法發布

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 📦 第壱段階: 憲法ノ謄寫（Build）
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  tousha:
    name: 📦 憲法ノ謄寫（transcrire la constitution impériale）
    runs-on: ubuntu-latest
    steps:
      - name: 📥 御眞影ノチェックアウト
        uses: actions/checkout@v4

      - name: ⚙️ 內閣印刷局 — Node.js 環境ヲ整備ス
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📜 GitHub Pages 官報設定
        uses: actions/configure-pages@v5

      - name: 📦 依存關係ノ奉納
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "【內閣印刷局】依存 package ヲ奉納ス"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npm install

      - name: 🔨 憲法ノ謄寫（TypeScript → JavaScript → 靜的 JSON）
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║  🔨 內閣印刷局 — 帝國憲法謄寫工程                       ║"
          echo "║                                                          ║"
          echo "║  工程壱: tsc — TypeScript ヲ JavaScript ニ compile        ║"
          echo "║  工程弐: cp — 靜的 files ヲ dist ニ配置                   ║"
          echo "║  工程参: generate-static-json — 靜的 JSON API ヲ生成      ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""
          npm run build
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "【謄寫完了】帝國憲法ノ謄寫ヲ恙ナク完了セリ。"
          echo "  dist/ 以下ニ官報掛載用ノ成果物ヲ格納セリ。"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 📤 成果物ヲ奉呈ス（Upload Artifact）
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 🏛️ 第弐段階: 官報掛載（Deploy）— 臣民ヘノ公布
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  kofu:
    name: 🏛️ 官報掛載 — 臣民ヘノ公布（publier au journal officiel）
    needs: tousha
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🏛️ 官報ニ掛載シ臣民ニ公布ス
        id: deployment
        uses: actions/deploy-pages@v4
